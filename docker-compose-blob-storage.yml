services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    restart: always
    command: >
      azurite --loose
      --blobHost 0.0.0.0 --blobPort 10000
      --location /data
      --skipApiVersionCheck
    ports:
      - "10000:10000"
    volumes:
      - ./storage-data:/data
    networks:
      - storage-emulator

networks:
  storage-emulator: